<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML - Level 3</title>
</head>
<body>
    <table border = "blue">
        <caption>Food Menu</caption>
        <tr>
            <th>Item</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>Frooti</td>
            <td>10</td>
        </tr>
        <tr>
            <td>Samosa</td>
            <td>20</td>
        </tr>
        <tr>
            <td>Alu Bhujiya</td>
            <td>50</td>
        </tr>
        <tr>
            <td>Chips</td>
            <td>33</td>
        </tr>
    </table>

    <br>
    <table border = "black">
        <caption>Food Menu 2</caption>
        <thead>
            <tr>
                <th rowspan = "2">Item</th>
                <th colspan = "2">Price</th>
            </tr>
            <tr>
                <th >INR</th>
                <th >USD</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Frooti</td>
                <td>10</td>
                <td>0.11</td>
            </tr>
            <tr>
                <td>Sampoo</td>
                <td>12</td>
                <td>0.17</td>
            </tr>
            <tr>
                <td>Chips</td>
                <td>30</td>
                <td>0.20</td>
            </tr>


        </tbody>
    </table>
</body>
</html>
