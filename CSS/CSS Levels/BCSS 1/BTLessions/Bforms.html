<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap </title>
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
    rel="stylesheet"
    />
    <link rel="stylesheet" href="Bforms.css" />
</head>
<body>
    <div>
        <nav class="navbar bg-primary  fixed-top navbar-expand-lg" data-bs-theme="dark">
            <div class="container-fluid">
                <a href="#" class="navbar-brand">Brand Name</a>
                <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link" href="#">Home</a>
                        <a class="nav-link" href="#">About Us</a>
                        <a class="nav-link" href="#">contect</a>
                    </div>
                </div>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
                    <button class="btn btn-outline-white" type="submit">Search</button>
                </form>
            </div>
        </nav><br>
    </div>
    
    <div class="container">
        <h2>Form Demo</h2>
        <form>
            <div class="row">
                <div class="mb-3 col">
                    <label class="form-label"
                    for="email">Email</label>
                    <input
                    type="text"
                    class="form-control"
                    placeholder="email"
                    id="email"/>
                </div>
                <div class="mb-3 col-md-6">
                    <label class="form-label"
                        for="Password">Password</label>
                        <input type="Password"
                        class="form-control"
                        placeholder="Password"
                        id="Password"/>
                </div>
    <!--  Co-md-6 karne par ham jitna screen ko kam krenge uski position change hogi -->
                <div class="mb-3 col-md-6">
                    <label class="form-label-lg"
                        for="Address">Address</label>
                        <input type="Address"
                        class="form-control"
                        placeholder="Address"
                        id="Address"/>
                </div>
            </div>
        </form>
    </div><br>


    <!-- discussion About Forms -->
        <div>
            <select class="form-select form-select-lg mb-3 col" aria-label="Default select example">
                <option selected>Select your City</option>
                <option value="1">Jabalpur</option>
                <option value="2">Delhi</option>
                <option value="3">Banglore</option>
            </select>
        </div><br>

        <!-- Discussion About Redio Buttons Checkbox -->
        <div class="row">
            <div class=" col-md-6 form-check ">
                <input type="checkbox" id="agree" class="form-check-input">
                <label for="agreebs" class="form-check-label">Agree</label>
            </div>

            <!-- Radio Buttons -->
            <div class=" mb-3 form-check col-md-6">
                <input type="radio" id="Radiobs" class="form-check-input">
                <label for="Radiobs" class="form-check-label">Yes/No</label>
            </div><br>

            <div class="form-check form-switch col-md-3 ">
                <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDefault">
                <label class="form-check-label" for="switchCheckDefault">Default switch checkbox input</label>
            </div>
        </div>
        
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
